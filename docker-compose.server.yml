services:
  briar-bot:
    image: ${BRIAR_BOT_IMAGE:?Set BRIAR_BOT_IMAGE to your GHCR image, for example ghcr.io/owner/briar-bot:latest}
    container_name: briar-bot
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - TZ=${TIMEZONE:-UTC}

    env_file:
      - .env

    volumes:
      - ./cache:/app/cache:rw
      - ./logs:/app/logs:rw
      - /etc/localtime:/etc/localtime:ro

    healthcheck:
      test: ["CMD", "node", "-e", "console.log('OK'); process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 120s

    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "2"
        compress: "true"

    labels:
      - "com.briar-bot.service=discord-bot"
      - "com.briar-bot.environment=production"
      - "com.briar-bot.version=2.0"
