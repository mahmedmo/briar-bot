name: Manage Character Data

on:
  workflow_dispatch:
    inputs:
      character_name:
        description: Full Epic Seven character name
        required: true
        type: string
      aliases:
        description: Optional aliases or abbreviations, separated by commas or new lines
        required: false
        type: string
      target_branch:
        description: Branch to update
        required: true
        default: main
        type: string

permissions:
  contents: write
  packages: write

jobs:
  update_character_data:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit_changes.outputs.changed }}
      commit_sha: ${{ steps.commit_changes.outputs.commit_sha }}
      target_branch: ${{ inputs.target_branch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update character data
        env:
          CHARACTER_NAME: ${{ inputs.character_name }}
          CHARACTER_ALIASES: ${{ inputs.aliases }}
        run: node scripts/upsert-character-data.js --character "$CHARACTER_NAME" --aliases "$CHARACTER_ALIASES"

      - name: Validate character data
        run: npm run test:character-data

      - name: Commit changes
        id: commit_changes
        env:
          CHARACTER_NAME: ${{ inputs.character_name }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          if git diff --quiet; then
            echo "No character data changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/character-names.json data/character-aliases.json
          git commit -m "chore(data): update ${CHARACTER_NAME}"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish_container:
    needs: update_character_data
    if: ${{ needs.update_character_data.outputs.changed == 'true' && needs.update_character_data.outputs.target_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out committed revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update_character_data.outputs.commit_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate character data
        run: npm run test:character-data

      - name: Set image coordinates
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:sha-${{ steps.image.outputs.short_sha }}
